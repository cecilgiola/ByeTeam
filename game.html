<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Mini Game</title>

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
  font-family: monospace;
  touch-action: none;
  overscroll-behavior: none;
}

canvas {
  display: block;
  width: 100vw;
  height: 100vh;
  image-rendering: pixelated;
  touch-action: none;
}

.phone-item {
  position: fixed;
  width: auto;
  image-rendering: pixelated;
  pointer-events: none;
  z-index: 10;
}
</style>
</head>

<body>

<canvas id="game"></canvas>
<audio id="bgMusic" src="assets/credits-music.mp3" preload="auto" loop></audio>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const DESIGN_W = 1440;
const DESIGN_H = 900;

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  syncPhones();
}

resizeCanvas();

function getView() {
  const screenRatio = canvas.width / canvas.height;
  const designRatio = DESIGN_W / DESIGN_H;

  let w, h, x, y;

  if (screenRatio > designRatio) {
    h = canvas.height;
    w = h * designRatio;
    x = (canvas.width - w) / 2;
    y = 0;
  } else {
    w = canvas.width;
    h = w / designRatio;
    x = 0;
    y = (canvas.height - h) / 2;
  }

  return {
    x,
    y,
    w,
    h,
    scale: w / DESIGN_W
  };
}

function sx(x) {
  const view = getView();
  return view.x + x * view.scale;
}

function sy(y) {
  const view = getView();
  return view.y + y * view.scale;
}

function sw(value) {
  return value * getView().scale;
}

function screenToGameX(screenX) {
  const view = getView();
  return (screenX - view.x) / view.scale;
}

const playerName = localStorage.getItem("player") || "paolo";

let state = "room";
let collected = 0;
let creditsY = DESIGN_H;
let creditsFinished = false;

const bgMusic = document.getElementById("bgMusic");
let musicStarted = false;

function startMusic() {
  if (!bgMusic) return;
  if (musicStarted) return;

  musicStarted = true;
  bgMusic.volume = 0.35;
  bgMusic.play().catch(() => {});
}

window.addEventListener("load", startMusic);

let audioCtx = null;

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  if (audioCtx.state === "suspended") {
    audioCtx.resume();
  }

  startMusic();
}

function playCoinSound() {
  initAudio();

  const now = audioCtx.currentTime;

  const osc1 = audioCtx.createOscillator();
  const osc2 = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc1.type = "sine";
  osc2.type = "triangle";

  osc1.frequency.setValueAtTime(980, now);
  osc2.frequency.setValueAtTime(1470, now);

  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.exponentialRampToValueAtTime(0.12, now + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.12);

  osc1.connect(gain);
  osc2.connect(gain);
  gain.connect(audioCtx.destination);

  osc1.start(now);
  osc2.start(now);

  osc1.stop(now + 0.12);
  osc2.stop(now + 0.12);
}

function goToCredits() {
  state = "credits";
  clearPhones();
  creditsY = DESIGN_H;
  creditsFinished = false;
  startMusic();
}

const keys = {};
let targetX = null;

document.addEventListener("keydown", e => {
  keys[e.key] = true;
  targetX = null;
  initAudio();
});

document.addEventListener("keyup", e => {
  keys[e.key] = false;
});

canvas.addEventListener("pointerdown", e => {
  initAudio();

  if (state !== "room") return;

  targetX = screenToGameX(e.clientX) - player.width / 2;
  player.facing = targetX > player.x ? 1 : -1;
});

canvas.addEventListener("pointermove", e => {
  if (state !== "room") return;
  if (!e.buttons && e.pointerType === "mouse") return;

  targetX = screenToGameX(e.clientX) - player.width / 2;
  player.facing = targetX > player.x ? 1 : -1;
});

document.addEventListener("click", initAudio);

function loadImage(src) {
  const img = new Image();
  img.src = src;
  return img;
}

const roomByPlayer = {
  paolo: "assets/paolo stanza.png",
  andrea: "assets/andrea stanza.png",
  daniele: "assets/daniele stanza.png",
  luca: "assets/luca stanza.png",
  simona: "assets/simona stanza.png",
  ana: "assets/ana stanza.png"
};

const images = {
  room: loadImage(roomByPlayer[playerName]),
  finalRoom: loadImage("assets/stanza finale.png"),
  cup: loadImage("assets/coppa.png"),
  door: loadImage("assets/porta.png"),
  end: loadImage("assets/fine.png"),
  credits: loadImage("assets/credits.png"),
  fumetto: loadImage("assets/fumetto.png")
};

const names = [
  "paolo",
  "andrea",
  "daniele",
  "luca",
  "simona",
  "ana",
  "cecilia"
];

const sprites = {};

names.forEach(name => {
  sprites[name] = {
    idle: loadImage(`assets/characters/${name}/idle.png`),
    walk: [
      loadImage(`assets/characters/${name}/idle.png`),
      loadImage(`assets/characters/${name}/walk-1.png`),
      loadImage(`assets/characters/${name}/walk-2.png`)
    ],
    ciao: name === "cecilia"
      ? loadImage("assets/characters/cecilia/ciao.png")
      : null
  };
});

function getFloorY() {
  return 828;
}

function getPhoneY() {
  return 745;
}

function getFinalBackFloorY() {
  return 875;
}

function getFinalFrontFloorY() {
  return 880;
}

let player = {
  x: 100,
  height: 280,
  speed: 280,
  step: 0,
  moving: false,
  facing: 1,
  width: 160
};

let door = {
  x: 1160,
  y: 498,
  w: 225,
  h: 330
};

let phones = [];

let cecilia = {
  x: 80,
  height: 250,
  speed: 115,
  step: 0,
  phase: "walk",
  helloTimer: 0,
  width: 120
};

const finalAvatars = [
  { name: "paolo", x: 80 },
  { name: "andrea", x: 180 },
  { name: "daniele", x: 280 },
  { name: "luca", x: 380 },
  { name: "simona", x: 480 },
  { name: "ana", x: 580 }
];

window.addEventListener("resize", resizeCanvas);
window.addEventListener("orientationchange", () => {
  setTimeout(resizeCanvas, 250);
});

function drawBackground(img) {
  const view = getView();

  ctx.fillStyle = "#000";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (!img || !img.complete || img.naturalWidth === 0 || img.naturalHeight === 0) return;

  ctx.drawImage(img, view.x, view.y, view.w, view.h);
}

function getImageRatio(img) {
  if (!img || !img.complete || img.naturalWidth === 0 || img.naturalHeight === 0) {
    return 1;
  }

  return img.naturalWidth / img.naturalHeight;
}

function drawSprite(name, x, floorY, height, moving = false, step = 0, facing = 1, special = null, speed = 7.5) {
  let img;

  if (special === "ciao" && sprites[name].ciao) {
    img = sprites[name].ciao;
  } else if (moving) {
    const frame = Math.floor(step * speed) % 3;
    img = sprites[name].walk[frame];
  } else {
    img = sprites[name].idle;
  }

  if (!img || !img.complete || img.naturalWidth === 0) {
    img = sprites[name].idle;
  }

  const ratio = getImageRatio(img);
  const width = height * ratio;
  const y = floorY - height;

  ctx.save();

  if (facing === -1) {
    ctx.translate(sx(x + width), sy(y));
    ctx.scale(-1, 1);
    ctx.drawImage(img, 0, 0, sw(width), sw(height));
  } else {
    ctx.drawImage(img, sx(x), sy(y), sw(width), sw(height));
  }

  ctx.restore();

  return { width, height, y };
}

function drawFumetto(spriteInfo) {
  const ratio = getImageRatio(images.fumetto);

  const bubbleW = 130;
  const bubbleH = bubbleW / ratio;

  const bubbleX =
    cecilia.x +
    spriteInfo.width / 2 -
    bubbleW / 2 -
    90;

  const bubbleY =
    spriteInfo.y -
    bubbleH -
    5;

  ctx.drawImage(
    images.fumetto,
    sx(bubbleX),
    sy(bubbleY),
    sw(bubbleW),
    sw(bubbleH)
  );
}

function drawDoor(floorY = getFloorY()) {
  door.w = 225;
  door.h = 330;
  door.x = 1160;
  door.y = floorY - door.h;

  ctx.drawImage(
    images.door,
    sx(door.x),
    sy(door.y),
    sw(door.w),
    sw(door.h)
  );
}

function rectsOverlap(a, b) {
  return (
    a.x < b.x + b.w &&
    a.x + a.w > b.x &&
    a.y < b.y + b.h &&
    a.y + a.h > b.y
  );
}

function getPlayerHitbox() {
  return {
    x: player.x,
    y: getFloorY() - player.height,
    w: player.width,
    h: player.height
  };
}

function createPhoneElement(phone) {
  const img = document.createElement("img");
  img.src = "assets/cellulare.gif";
  img.className = "phone-item";
  document.body.appendChild(img);
  phone.el = img;
  syncPhone(phone);
}

function syncPhone(phone) {
  if (!phone.el) return;

  phone.y = getPhoneY();

  phone.el.style.left = sx(phone.x) + "px";
  phone.el.style.top = sy(phone.y) + "px";
  phone.el.style.height = sw(phone.h) + "px";
}

function syncPhones() {
  phones.forEach(phone => syncPhone(phone));
}

function removePhone(phone) {
  if (phone.el && phone.el.parentNode) {
    phone.el.parentNode.removeChild(phone.el);
  }
}

function clearPhones() {
  phones.forEach(phone => removePhone(phone));
  phones = [];
}

function isPhoneOverlapping(newPhone) {
  const minDistance = 190;

  for (const phone of phones) {
    const dx = Math.abs(newPhone.x - phone.x);

    if (dx < minDistance) {
      return true;
    }
  }

  return false;
}

function isPhoneOnPlayer(newPhone) {
  return rectsOverlap(newPhone, getPlayerHitbox());
}

function spawnPhones() {
  if (state !== "room") return;
  if (phones.length >= 3) return;

  let attempts = 0;

  while (phones.length < 3 && attempts < 100) {
    attempts++;

    const phoneH = 82;
    const phoneW = 82;

    const newPhone = {
      x: Math.random() * 920 + 170,
      y: getPhoneY(),
      h: phoneH,
      w: phoneW,
      el: null
    };

    if (!isPhoneOverlapping(newPhone) && !isPhoneOnPlayer(newPhone)) {
      phones.push(newPhone);
      createPhoneElement(newPhone);
    }
  }
}

function checkPhones() {
  if (state !== "room") return;

  const playerHitbox = getPlayerHitbox();

  phones = phones.filter(item => {
    item.y = getPhoneY();

    const hit = rectsOverlap(playerHitbox, item);

    if (hit) {
      playCoinSound();
      collected++;
      removePhone(item);
      return false;
    }

    return true;
  });
}

function drawHUD() {
  ctx.fillStyle = "#2F80FF";
  ctx.font = `bold ${sw(32)}px monospace`;
  ctx.fillText("📱 " + collected, sx(40), sy(55));
}

function drawCup() {
  const ratio = getImageRatio(images.cup);
  const baseH = 330;
  const baseW = baseH * ratio;

  const pulse = 1 + Math.sin(performance.now() / 180) * 0.08;

  const w = baseW * pulse;
  const h = baseH * pulse;

  const x = DESIGN_W / 2 - w / 2;
  const y = DESIGN_H / 2 - h / 2 - 60;

  ctx.drawImage(images.cup, sx(x), sy(y), sw(w), sw(h));
}

function checkDoor() {
  if (state !== "room") return;
  if (collected < 10) return;

  const playerHitbox = getPlayerHitbox();
  const hit = rectsOverlap(playerHitbox, door);

  if (hit) {
    clearPhones();
    state = "finalRoom";
  }
}

function updateRoom(dt) {
  player.height = 280;
  player.speed = 280;
  player.moving = false;

  if (keys["ArrowRight"]) {
    targetX = null;
    player.x += player.speed * dt;
    player.moving = true;
    player.facing = 1;
  }

  if (keys["ArrowLeft"]) {
    targetX = null;
    player.x -= player.speed * dt;
    player.moving = true;
    player.facing = -1;
  }

  if (!keys["ArrowRight"] && !keys["ArrowLeft"] && targetX !== null) {
    const distance = targetX - player.x;

    if (Math.abs(distance) > 4) {
      player.x += Math.sign(distance) * player.speed * dt;
      player.moving = true;
      player.facing = distance > 0 ? 1 : -1;
    } else {
      player.x = targetX;
      targetX = null;
    }
  }

  player.x = Math.max(0, Math.min(DESIGN_W - player.width, player.x));

  if (player.moving) {
    player.step += dt;
  }

  spawnPhones();
  syncPhones();
  checkPhones();
  checkDoor();
}

function drawRoom() {
  drawBackground(images.room);

  if (collected >= 10) {
    drawCup();
    drawDoor(getFloorY());
  }

  const size = drawSprite(
    playerName,
    player.x,
    getFloorY(),
    player.height,
    player.moving,
    player.step,
    player.facing
  );

  player.width = size.width;

  drawHUD();
}

function updateFinalRoom(dt) {
  const exitX = 1080;
  cecilia.speed = 115;

  if (cecilia.phase === "walk") {
    cecilia.x += cecilia.speed * dt;
    cecilia.step += dt;

    if (cecilia.x >= exitX) {
      cecilia.phase = "ciao";
      cecilia.helloTimer = 2;
    }
  }

  else if (cecilia.phase === "ciao") {
    cecilia.helloTimer -= dt;

    if (cecilia.helloTimer <= 0) {
      goToCredits();
    }
  }
}

function drawFinalRoom() {
  drawBackground(images.finalRoom);

  finalAvatars.forEach(member => {
    drawSprite(
      member.name,
      member.x,
      getFinalBackFloorY(),
      250,
      false
    );
  });

  drawDoor(getFinalFrontFloorY());

  if (cecilia.phase === "ciao") {
    const spriteInfo = drawSprite(
      "cecilia",
      cecilia.x,
      getFinalFrontFloorY(),
      250,
      false,
      cecilia.step,
      1,
      "ciao"
    );

    drawFumetto(spriteInfo);

  } else {
    drawSprite(
      "cecilia",
      cecilia.x,
      getFinalFrontFloorY(),
      250,
      true,
      cecilia.step,
      1,
      null,
      10
    );
  }
}

function drawCredits() {
  if (creditsFinished) {
    ctx.fillStyle = "#000000";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    return;
  }

  drawBackground(images.end);

  let creditW = DESIGN_W * 0.75;
  let creditH;

  if (images.credits.complete && images.credits.naturalWidth > 0) {
    const ratio = images.credits.naturalHeight / images.credits.naturalWidth;
    creditH = creditW * ratio;
  } else {
    creditH = DESIGN_H * 1.2;
  }

  const creditX = DESIGN_W / 2 - creditW / 2;

  ctx.drawImage(
    images.credits,
    sx(creditX),
    sy(creditsY),
    sw(creditW),
    sw(creditH)
  );

  creditsY -= 2.2;

  if (creditsY < -creditH) {
    creditsFinished = true;
  }
}

function update(dt) {
  if (state === "room") updateRoom(dt);
  if (state === "finalRoom") updateFinalRoom(dt);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (state === "room") drawRoom();
  if (state === "finalRoom") drawFinalRoom();
  if (state === "credits") drawCredits();
}

let last = 0;

function loop(time) {
  const dt = (time - last) / 1000;
  last = time;

  update(dt);
  draw();

  requestAnimationFrame(loop);
}

loop(0);
</script>

</body>
</html>
